<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Bird - Wireframe Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #holo-canvas { width: 100vw; height: 100vh; display: block; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00d5ff; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; 
            letter-spacing: 2px; text-shadow: 0 0 15px #00d5ff; z-index: 10; text-align: center;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="loading">Loading Hologram...</div>
    <canvas id="holo-canvas"></canvas>

    <script>
        var canvas = document.getElementById('holo-canvas');
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true, premultipliedAlpha: false });
        renderer.setClearColor(0x000000, 0); 
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        var scene = new THREE.Scene(); 
        var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100); 
        camera.position.set(0, 0.5, 4.5); 

        var controls = new THREE.OrbitControls(camera, canvas); 
        controls.enableDamping = true; 
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 1.2; 
        controls.enableZoom = true;
        controls.zoomSpeed = 2.0;

        // ====================================================================
        // SHADER IBRIDO: Scanline eteree di Mancini + Riflesso indistruttibile
        // ====================================================================
        var params = {
          fresnelOpacity: 1.0,
          fresnelAmount: 0.7,
          scanlineSize: 3.7,
          hologramBrightness: 1.6,
          signalSpeed: 0.67,
          hologramColor: "#00d5ff",
          enableBlinking: true,
          blinkFresnelOnly: true,
          hologramOpacity: 0.5,
          wireframe: false // Valore di partenza: solido (false)
        };

        var holographicMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0.0 },
            hologramColor: { value: new THREE.Color(params.hologramColor) },
            hologramBrightness: { value: params.hologramBrightness },
            hologramOpacity: { value: params.hologramOpacity },
            fresnelOpacity: { value: params.fresnelOpacity },
            fresnelAmount: { value: params.fresnelAmount },
            scanlineSize: { value: params.scanlineSize },
            signalSpeed: { value: params.signalSpeed },
            enableBlinking: { value: params.enableBlinking ? 1.0 : 0.0 },
            blinkFresnelOnly: { value: params.blinkFresnelOnly ? 1.0 : 0.0 }
          },
          vertexShader: `
            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec4 vPos;
            varying vec2 vUv;
            
            void main() {
              vUv = uv;
              vNormal = normalize(normalMatrix * normal);
              vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
              vViewPosition = -mvPosition.xyz;
              vPos = projectionMatrix * mvPosition;
              gl_Position = vPos;
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 hologramColor;
            uniform float hologramBrightness;
            uniform float hologramOpacity;
            uniform float fresnelOpacity;
            uniform float fresnelAmount;
            uniform float scanlineSize;
            uniform float signalSpeed;
            uniform float enableBlinking;
            uniform float blinkFresnelOnly;

            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec4 vPos;
            varying vec2 vUv;

            float flicker( float amt, float time ) {return clamp( fract( cos( time ) * 43758.5453123 ), amt, 1.0 );}
            float random(vec2 p) { return fract((cos(dot(p, vec2(12.9898,78.233))) * 43758.5453)); }

            void main() {
              // SCANLINES IN SCREEN SPACE (Mancini original)
              vec2 vCoords = vPos.xy;
              vCoords /= vPos.w;
              vCoords = vCoords * 0.5 + 0.5;
              vec2 myUV = fract( vCoords );

              vec4 holoColor = vec4(hologramColor, mix(hologramBrightness, vUv.y, 0.5));

              float scanlines = 10.;
              scanlines += 20. * sin(time * signalSpeed * 20.8 - myUV.y * 60. * scanlineSize);
              scanlines *= smoothstep(1.3 * cos(time * signalSpeed + myUV.y * scanlineSize), 0.78, 0.9);
              scanlines *= max(0.25, sin(time * signalSpeed) * 1.0);        
              
              float r = random(vUv);
              float g = random(vUv * 20.2);
              float b = random(vUv * 0.9);

              holoColor += vec4(r*scanlines, b*scanlines, r, 1.0) / 84.;
              vec4 scanlineMix = mix(vec4(0.0), holoColor, holoColor.a);

              // FRESNEL IN VIEW SPACE (Infallibile)
              vec3 normal = normalize(vNormal);
              vec3 viewDir = normalize(vViewPosition);
              float dotProduct = max(dot(normal, viewDir), 0.0);
              
              float fresnelEffect = dotProduct * (1.6 - fresnelOpacity / 2.0);
              fresnelEffect = clamp(fresnelAmount - fresnelEffect, 0.0, fresnelOpacity);

              float blinkValue = (enableBlinking > 0.5) ? 0.6 - signalSpeed : 1.0;
              float blink = flicker(blinkValue, time * signalSpeed * 0.02);
          
              vec3 finalColor;
              if (blinkFresnelOnly > 0.5) {
                finalColor = scanlineMix.rgb + fresnelEffect * blink;
              } else {
                finalColor = scanlineMix.rgb * blink + fresnelEffect;
              }

              gl_FragColor = vec4(finalColor, hologramOpacity);
            }
          `,
          transparent: true,
          blending: THREE.AdditiveBlending, 
          depthWrite: false,
          side: THREE.DoubleSide,
          wireframe: params.wireframe // Impostazione iniziale nativa
        });

        // ==========================================
        // CONFIGURAZIONE DAT.GUI
        // ==========================================
        var gui = new dat.GUI();
        var folder = gui.addFolder('Controls');
        folder.add(params, 'fresnelOpacity', 0, 2).name('Fresnel Opacity').onChange(v => holographicMaterial.uniforms.fresnelOpacity.value = v);
        folder.add(params, 'fresnelAmount', 0, 3).name('Fresnel Amount').onChange(v => holographicMaterial.uniforms.fresnelAmount.value = v);
        folder.add(params, 'scanlineSize', 0, 10).name('Scanline Size').onChange(v => holographicMaterial.uniforms.scanlineSize.value = v);
        folder.add(params, 'hologramBrightness', 0, 4).name('Hologram Brightness').onChange(v => holographicMaterial.uniforms.hologramBrightness.value = v);
        folder.add(params, 'signalSpeed', 0, 3).name('Signal Speed').onChange(v => holographicMaterial.uniforms.signalSpeed.value = v);
        folder.addColor(params, 'hologramColor').name('Hologram Color').onChange(v => holographicMaterial.uniforms.hologramColor.value.set(v));
        folder.add(params, 'enableBlinking').name('Enable Blinking').onChange(v => holographicMaterial.uniforms.enableBlinking.value = v ? 1.0 : 0.0);
        folder.add(params, 'blinkFresnelOnly').name('Blink Fresnel Only').onChange(v => holographicMaterial.uniforms.blinkFresnelOnly.value = v ? 1.0 : 0.0);
        folder.add(params, 'hologramOpacity', 0, 1).name('Hologram Opacity').onChange(v => holographicMaterial.uniforms.hologramOpacity.value = v);
        
        // AGGIUNTA AGGIORNAMENTO WIREFRAME IN TEMPO REALE
        folder.add(params, 'wireframe').name('Wireframe Mode').onChange(v => {
            holographicMaterial.wireframe = v;
            holographicMaterial.needsUpdate = true; // Forza lo shader a ricompilarsi per mostrare le linee
        });
        
        folder.open();

        // ==========================================
        // CARICAMENTO MODELLO TRAMITE CDN
        // ==========================================
        var dracoLoader = new THREE.DRACOLoader(); 
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/'); 
        
        var loader = new THREE.GLTFLoader(); 
        loader.setDRACOLoader(dracoLoader); 

        var modelUrl = 'https://cdn.jsdelivr.net/gh/Ipampero/drinkingbird-asset@main/TwixDrinkingBirdLastRigwireframecomporessed-v1.glb';

        loader.load( 
          modelUrl, 
          function(gltf) { 
            document.getElementById('loading').style.display = 'none'; 
            var model = gltf.scene; 
            var box = new THREE.Box3().setFromObject(model); 
            var center = box.getCenter(new THREE.Vector3()); 
            var size = box.getSize(new THREE.Vector3()); 
            var scale = 3 / Math.max(size.x, size.y, size.z); 
            model.position.sub(center.multiplyScalar(scale)); 
            model.scale.setScalar(scale); 
            model.traverse(function(child) { if (child.isMesh) child.material = holographicMaterial; }); 
            scene.add(model); 
          },
          undefined,
          function(err) { 
             console.error('Errore:', err); 
             document.getElementById('loading').innerHTML = "Errore di caricamento!";
          }
        ); 

        window.addEventListener('resize', function() { 
          camera.aspect = window.innerWidth / window.innerHeight; 
          camera.updateProjectionMatrix(); 
          renderer.setSize(window.innerWidth, window.innerHeight); 
        }); 

        var clock = new THREE.Clock();
        function animate() { 
          requestAnimationFrame(animate); 
          controls.update(); 
          if (holographicMaterial && holographicMaterial.uniforms) {
              holographicMaterial.uniforms.time.value = clock.getElapsedTime();
          }
          renderer.render(scene, camera); 
        } 
        animate(); 
    </script>
</body>
</html>
