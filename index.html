<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Bird Final</title>
    <style>
        /* Sfondo scuro per far brillare il neon, toglie i bordi bianchi dell'iframe */
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #holo-canvas { width: 100vw; height: 100vh; display: block; }
        
        /* Stile della scritta di caricamento */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00d5ff; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; 
            letter-spacing: 2px; text-shadow: 0 0 15px #00d5ff; z-index: 10;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="loading">Caricamento Ologramma...</div>
    
    <canvas id="holo-canvas"></canvas>

    <script>
        var canvas = document.getElementById('holo-canvas');
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true, premultipliedAlpha: false });
        // Sfondo trasparente nel WebGL (mostra il background del body CSS)
        renderer.setClearColor(0x000000, 0); 
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        var scene = new THREE.Scene(); 
        var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100); 
        camera.position.set(0, 0.5, 4.5); 

        var controls = new THREE.OrbitControls(camera, canvas); 
        controls.enableDamping = true; 
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 1.2; 
        controls.enableZoom = true;
        controls.zoomSpeed = 2.0;

        // ==========================================
        // 1. PARAMETRI SHADER (Dal tuo screenshot preferito)
        // ==========================================
        var params = {
          fresnelOpacity: 1.0,
          fresnelAmount: 0.7,
          scanlineSize: 3.7,
          hologramBrightness: 1.6,
          signalSpeed: 0.67,
          hologramColor: "#00d5ff",
          enableBlinking: true,
          blinkFresnelOnly: true,
          hologramOpacity: 0.5
        };

        // ==========================================
        // 2. SHADER OLOGRAFICO CORRETTO (Matematica Originale)
        // ==========================================
        var holographicMaterial = new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0.0 },
            hologramColor: { value: new THREE.Color(params.hologramColor) },
            hologramBrightness: { value: params.hologramBrightness },
            hologramOpacity: { value: params.hologramOpacity },
            fresnelOpacity: { value: params.fresnelOpacity },
            fresnelAmount: { value: params.fresnelAmount },
            scanlineSize: { value: params.scanlineSize },
            signalSpeed: { value: params.signalSpeed },
            enableBlinking: { value: params.enableBlinking ? 1.0 : 0.0 },
            blinkFresnelOnly: { value: params.blinkFresnelOnly ? 1.0 : 0.0 }
          },
          vertexShader: `
            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec3 vWorldPosition;
            
            void main() {
              // Calcolo posizione mondo 3D per le scanlines
              vec4 worldPosition = modelMatrix * vec4(position, 1.0);
              vWorldPosition = worldPosition.xyz;
              
              // Calcolo posizione telecamera
              vec4 mvPosition = viewMatrix * worldPosition;
              vViewPosition = -mvPosition.xyz;
              
              // Trasferisco e normalizzo le normali
              vNormal = normalize(normalMatrix * normal);
              
              gl_Position = projectionMatrix * mvPosition;
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform vec3 hologramColor;
            uniform float hologramBrightness;
            uniform float hologramOpacity;
            uniform float fresnelOpacity;
            uniform float fresnelAmount;
            uniform float scanlineSize;
            uniform float signalSpeed;
            uniform float enableBlinking;
            uniform float blinkFresnelOnly;

            varying vec3 vViewPosition;
            varying vec3 vNormal;
            varying vec3 vWorldPosition;

            float random(vec2 p) {
              return fract(sin(dot(p.xy, vec2(12.9898, 78.233))) * 43758.5453);
            }

            void main() {
              vec3 normal = normalize(vNormal);
              vec3 viewDir = normalize(vViewPosition);
              
              // 1. FRESNEL (Il bagliore sui bordi)
              float dotProduct = max(dot(normal, viewDir), 0.0);
              float fresnel = pow(max(1.0 - dotProduct, 0.0), fresnelAmount) * fresnelOpacity;

              // 2. SCANLINES (Le strisce di luce)
              // Moltiplicatori per allineare i numeri del menu alla grandezza reale del modello
              float scanline = sin(vWorldPosition.y * scanlineSize * 15.0 - time * signalSpeed * 10.0);
              scanline = smoothstep(-0.5, 0.5, scanline); 

              // 3. BLINK / GLITCH (Lo sfarfallio)
              float blink = 1.0;
              if (enableBlinking > 0.5) {
                float noise = random(vec2(time * 0.05, 0.0));
                blink = noise > 0.98 ? 0.0 : 1.0; 
              }

              // 4. COMPOSIZIONE (Unione Matematica)
              float finalFresnel = fresnel;
              float finalScanline = scanline * 0.4; // Le strisce volumetriche non devono bruciare l'immagine

              if (blinkFresnelOnly > 0.5) {
                finalFresnel *= blink;
              } else {
                finalFresnel *= blink;
                finalScanline *= blink;
              }

              // ADDIZIONE! Sommo le strisce al bagliore, non le moltiplico. 
              // Così i bordi esterni rimangono sempre accesi e l'effetto zebra scompare!
              float alpha = (finalFresnel + finalScanline) * hologramOpacity;

              vec3 finalColor = hologramColor * hologramBrightness;
              gl_FragColor = vec4(finalColor, alpha);
            }
          `,
          transparent: true,
          blending: THREE.AdditiveBlending, // Genera luce pura
          depthWrite: false,
          side: THREE.DoubleSide
        });

        // ==========================================
        // 3. COLLEGAMENTO DEI CURSORI GUI
        // ==========================================
        var gui = new dat.GUI();
        var folder = gui.addFolder('Hologram Controls');

        folder.add(params, 'fresnelOpacity', 0, 2).name('Bordi Opacity').onChange(v => holographicMaterial.uniforms.fresnelOpacity.value = v);
        folder.add(params, 'fresnelAmount', 0, 3).name('Bordi Spessore').onChange(v => holographicMaterial.uniforms.fresnelAmount.value = v);
        folder.add(params, 'scanlineSize', 0, 10).name('Righe Dimensione').onChange(v => holographicMaterial.uniforms.scanlineSize.value = v);
        folder.add(params, 'hologramBrightness', 0, 4).name('Brightness').onChange(v => holographicMaterial.uniforms.hologramBrightness.value = v);
        folder.add(params, 'signalSpeed', 0, 3).name('Velocità Onde').onChange(v => holographicMaterial.uniforms.signalSpeed.value = v);
        folder.addColor(params, 'hologramColor').name('Colore').onChange(v => holographicMaterial.uniforms.hologramColor.value.set(v));
        folder.add(params, 'enableBlinking').name('Attiva Glitch').onChange(v => holographicMaterial.uniforms.enableBlinking.value = v ? 1.0 : 0.0);
        folder.add(params, 'blinkFresnelOnly').name('Glitch Solo Bordi').onChange(v => holographicMaterial.uniforms.blinkFresnelOnly.value = v ? 1.0 : 0.0);
        folder.add(params, 'hologramOpacity', 0, 1).name('Opacity Globale').onChange(v => holographicMaterial.uniforms.hologramOpacity.value = v);

        folder.open(); // Pannello aperto di default

        // ==========================================
        // 4. CARICAMENTO MODELLO (Con il link funzionante e blindato)
        // ==========================================
        var dracoLoader = new THREE.DRACOLoader(); 
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/'); 
        
        var loader = new THREE.GLTFLoader(); 
        loader.setDRACOLoader(dracoLoader); 

        // HO RIMESSO IL LINK ASSOLUTO CHE USAVI PRIMA. 
        // È l'unico modo per garantire che carichi al 100% senza blocchi di sicurezza.
        // Ho aggiornato la versione a ?v=30 per forzare GitHub ad aggiornare la cache del file.
        loader.load( 
          'https://raw.githubusercontent.com/Ipampero/drinkingbird-asset/main/TwixDrinkingBirdLastRigwireframecomporessed-v1.glb?v=30', 
          function(gltf) { 
            // Rimuove la scritta "Caricamento Ologramma..." quando ha finito!
            document.getElementById('loading').style.display = 'none'; 
            
            var model = gltf.scene; 
            var box = new THREE.Box3().setFromObject(model); 
            var center = box.getCenter(new THREE.Vector3()); 
            var size = box.getSize(new THREE.Vector3()); 
            var scale = 3 / Math.max(size.x, size.y, size.z); 
            model.position.sub(center.multiplyScalar(scale)); 
            model.scale.setScalar(scale); 
            
            model.traverse(function(child) { 
              if (child.isMesh) { 
                child.material = holographicMaterial; 
              } 
            }); 
            scene.add(model); 
          },
          undefined,
          function(err) { 
             console.error('Errore:', err); 
             // Se qualcosa va storto, la scritta te lo dice
             document.getElementById('loading').innerHTML = "Errore nel caricamento 3D!";
             document.getElementById('loading').style.color = "red";
          }
        ); 

        window.addEventListener('resize', function() { 
          camera.aspect = window.innerWidth / window.innerHeight; 
          camera.updateProjectionMatrix(); 
          renderer.setSize(window.innerWidth, window.innerHeight); 
        }); 

        var clock = new THREE.Clock();

        function animate() { 
          requestAnimationFrame(animate); 
          controls.update(); 
          
          if (holographicMaterial && holographicMaterial.uniforms) {
              holographicMaterial.uniforms.time.value = clock.getElapsedTime();
          }

          renderer.render(scene, camera); 
        } 
        animate(); 
    </script>
</body>
</html>
