<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Bird</title>
    <style>
        /* Sfondo scuro per far brillare il neon, toglie i bordi bianchi */
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #holo-canvas { width: 100vw; height: 100vh; display: block; }
        
        /* Stile della scritta di caricamento */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00d5ff; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; 
            letter-spacing: 2px; text-shadow: 0 0 15px #00d5ff; z-index: 10;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="loading">Caricamento Ologramma...</div>
    
    <canvas id="holo-canvas"></canvas>

    <script>
        var canvas = document.getElementById('holo-canvas');
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setClearColor(0x000000, 0); // Trasparente per far vedere il background del CSS
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        var scene = new THREE.Scene(); 
        var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100); 
        camera.position.set(0, 0.5, 4.5); 

        var controls = new THREE.OrbitControls(camera, canvas); 
        controls.enableDamping = true; 
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 1.2; 

        // CLASSE MATERIALE ORIGINALE
        class HolographicMaterial extends THREE.ShaderMaterial {
          constructor(parameters = {}) {
            super();
            this.vertexShader = `
              #define STANDARD
              varying vec3 vViewPosition;
              #ifdef USE_TRANSMISSION
              varying vec3 vWorldPosition;
              #endif
              varying vec2 vUv;
              varying vec4 vPos;
              varying vec3 vNormalW;
              varying vec3 vPositionW;
              #include <common>
              #include <uv_pars_vertex>
              #include <envmap_pars_vertex>
              #include <color_pars_vertex>
              #include <fog_pars_vertex>
              #include <morphtarget_pars_vertex>
              #include <skinning_pars_vertex>
              #include <logdepthbuf_pars_vertex>
              #include <clipping_planes_pars_vertex>
              void main() {
                #include <uv_vertex>
                #include <color_vertex>
                #include <morphcolor_vertex>
                #if defined ( USE_ENVMAP ) || defined ( USE_SKINNING )
                  #include <beginnormal_vertex>
                  #include <morphnormal_vertex>
                  #include <skinbase_vertex>
                  #include <skinnormal_vertex>
                  #include <defaultnormal_vertex>
                #endif
                #include <begin_vertex>
                #include <morphtarget_vertex>
                #include <skinning_vertex>
                #include <project_vertex>
                #include <logdepthbuf_vertex>
                #include <clipping_planes_vertex>
                #include <worldpos_vertex>
                #include <envmap_vertex>
                #include <fog_vertex>
                mat4 modelViewProjectionMatrix = projectionMatrix * modelViewMatrix;
                vUv = uv;
                vPos = projectionMatrix * modelViewMatrix * vec4( transformed, 1.0 );
                vPositionW = vec3( vec4( transformed, 1.0 ) * modelMatrix);
                vNormalW = normalize( vec3( vec4( normal, 0.0 ) * modelMatrix ) );
                gl_Position = modelViewProjectionMatrix * vec4( transformed, 1.0 );
              }`;

            this.fragmentShader = ` 
              varying vec2 vUv;
              varying vec3 vPositionW;
              varying vec4 vPos;
              varying vec3 vNormalW;
              uniform float time;
              uniform float fresnelOpacity;
              uniform float scanlineSize;
              uniform float fresnelAmount;
              uniform float signalSpeed;
              uniform float hologramBrightness;
              uniform float hologramOpacity;
              uniform bool blinkFresnelOnly;
              uniform bool enableBlinking;
              uniform vec3 hologramColor;
              float flicker( float amt, float time ) {return clamp( fract( cos( time ) * 43758.5453123 ), amt, 1.0 );}
              float random(in float a, in float b) { return fract((cos(dot(vec2(a,b) ,vec2(12.9898,78.233))) * 43758.5453)); }
              void main() {
                vec2 vCoords = vPos.xy;
                vCoords /= vPos.w;
                vCoords = vCoords * 0.5 + 0.5;
                vec2 myUV = fract( vCoords );
                vec4 hologramColor = vec4(hologramColor, mix(hologramBrightness, vUv.y, 0.5));
                float scanlines = 10.;
                scanlines += 20. * sin(time *signalSpeed * 20.8 - myUV.y * 60. * scanlineSize);
                scanlines *= smoothstep(1.3 * cos(time *signalSpeed + myUV.y * scanlineSize), 0.78, 0.9);
                scanlines *= max(0.25, sin(time *signalSpeed) * 1.0);        
                float r = random(vUv.x, vUv.y);
                float g = random(vUv.y * 20.2,     vUv.y * .2);
                float b = random(vUv.y * .9,     vUv.y * .2);
                hologramColor += vec4(r*scanlines, b*scanlines, r, 1.0) / 84.;
                vec4 scanlineMix = mix(vec4(0.0), hologramColor, hologramColor.a);
                vec3 viewDirectionW = normalize(cameraPosition - vPositionW);
                float fresnelEffect = dot(viewDirectionW, vNormalW) * (1.6 - fresnelOpacity/2.);
                fresnelEffect = clamp(fresnelAmount - fresnelEffect, 0., fresnelOpacity);
                float blinkValue = enableBlinking ? 0.6 - signalSpeed : 1.0;
                float blink = flicker(blinkValue, time * signalSpeed * .02);
                vec3 finalColor;
                if(blinkFresnelOnly){
                  finalColor = scanlineMix.rgb + fresnelEffect * blink;
                }else{
                  finalColor = scanlineMix.rgb * blink + fresnelEffect;
                }
                gl_FragColor = vec4( finalColor, hologramOpacity);
              }`;

            this.uniforms = {
              time: new THREE.Uniform(0),
              fresnelOpacity: new THREE.Uniform(parameters.fresnelOpacity !== undefined ? parameters.fresnelOpacity : 1.0),
              fresnelAmount: new THREE.Uniform(parameters.fresnelAmount !== undefined ? parameters.fresnelAmount : 0.45),
              scanlineSize: new THREE.Uniform(parameters.scanlineSize !== undefined ? parameters.scanlineSize : 8.0),
              hologramBrightness: new THREE.Uniform(parameters.hologramBrightness !== undefined ? parameters.hologramBrightness : 1.0),
              signalSpeed: new THREE.Uniform(parameters.signalSpeed !== undefined ? parameters.signalSpeed : 1.0),
              hologramColor: new THREE.Uniform(parameters.hologramColor !== undefined ? new THREE.Color(parameters.hologramColor) : new THREE.Color("#00d5ff")),
              enableBlinking: new THREE.Uniform(parameters.enableBlinking !== undefined ? parameters.enableBlinking : true),
              blinkFresnelOnly: new THREE.Uniform(parameters.blinkFresnelOnly !== undefined ? parameters.blinkFresnelOnly : true),
              hologramOpacity: new THREE.Uniform(parameters.hologramOpacity !== undefined ? parameters.hologramOpacity : 1.0),
            };
            this.clock = new THREE.Clock();
            this.setValues(parameters);
            this.depthTest = false;
            this.blending = THREE.AdditiveBlending;
            this.transparent = true;
            this.side = THREE.DoubleSide;
          }
          update() { this.uniforms.time.value = this.clock.getElapsedTime(); }
        }

        var params = {
          fresnelOpacity: 1.0, fresnelAmount: 0.7, scanlineSize: 3.7,
          hologramBrightness: 1.6, signalSpeed: 0.67, hologramColor: "#00d5ff",
          enableBlinking: true, blinkFresnelOnly: true, hologramOpacity: 0.5
        };

        var hologramMaterial = new HolographicMaterial(params);

        var gui = new dat.GUI();
        var folder = gui.addFolder('Controls');
        folder.add(params, 'fresnelOpacity', 0, 2).onChange(v => hologramMaterial.uniforms.fresnelOpacity.value = v);
        folder.add(params, 'fresnelAmount', 0, 3).onChange(v => hologramMaterial.uniforms.fresnelAmount.value = v);
        folder.add(params, 'scanlineSize', 0, 10).onChange(v => hologramMaterial.uniforms.scanlineSize.value = v);
        folder.add(params, 'hologramBrightness', 0, 4).onChange(v => hologramMaterial.uniforms.hologramBrightness.value = v);
        folder.add(params, 'signalSpeed', 0, 3).onChange(v => hologramMaterial.uniforms.signalSpeed.value = v);
        folder.addColor(params, 'hologramColor').onChange(v => hologramMaterial.uniforms.hologramColor.value.set(v));
        folder.add(params, 'enableBlinking').onChange(v => hologramMaterial.uniforms.enableBlinking.value = v);
        folder.add(params, 'blinkFresnelOnly').onChange(v => hologramMaterial.uniforms.blinkFresnelOnly.value = v);
        folder.add(params, 'hologramOpacity', 0, 1).onChange(v => hologramMaterial.uniforms.hologramOpacity.value = v);

        var dracoLoader = new THREE.DRACOLoader(); 
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/'); 
        var loader = new THREE.GLTFLoader(); 
        loader.setDRACOLoader(dracoLoader); 

        // TORNATI AL LINK ASSOLUTO: Sicuro al 100% e bypassa i bug di GitHub Pages
        loader.load( 
          'https://raw.githubusercontent.com/Ipampero/drinkingbird-asset/main/TwixDrinkingBirdLastRigwireframecomporessed-v1.glb?v=99', 
          function(gltf) { 
            // Rimuove la scritta "Caricamento Ologramma..." quando ha finito!
            document.getElementById('loading').style.display = 'none'; 
            
            var model = gltf.scene; 
            var box = new THREE.Box3().setFromObject(model); 
            var center = box.getCenter(new THREE.Vector3()); 
            var size = box.getSize(new THREE.Vector3()); 
            var scale = 3 / Math.max(size.x, size.y, size.z); 
            model.position.sub(center.multiplyScalar(scale)); 
            model.scale.setScalar(scale); 
            model.traverse(function(child) { if (child.isMesh) child.material = hologramMaterial; }); 
            scene.add(model); 
          },
          undefined,
          function(err) { 
             console.error('Errore:', err); 
             // Se qualcosa va storto, la scritta te lo dice
             document.getElementById('loading').innerHTML = "Errore nel caricamento 3D!";
             document.getElementById('loading').style.color = "red";
          }
        ); 

        window.addEventListener('resize', function() { 
          camera.aspect = window.innerWidth / window.innerHeight; 
          camera.updateProjectionMatrix(); 
          renderer.setSize(window.innerWidth, window.innerHeight); 
        }); 

        function animate() { 
          requestAnimationFrame(animate); 
          controls.update(); 
          if (hologramMaterial) hologramMaterial.update();
          renderer.render(scene, camera); 
        } 
        animate(); 
    </script>
</body>
</html>
